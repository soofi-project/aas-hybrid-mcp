# Ablation Variant B — "Typed-Only / Layered Determinism".
#
# All generic write tools are disabled; only create_service_request_notification
# is available. The bypass path does not exist — the agent cannot construct
# a structurally invalid SRN.
#
# Usage:
#   ./up.sh --vllm -f docker-compose.yml -f docker-compose.vllm.yml -f docker-compose.variant-b.yml
#
# See memory/tasks/open/task_write_tools_ablation_study.md for the ablation design.

services:
  aas-hybrid-mcp:
    environment:
      WRITE_TOOLS_MODE: typed
