# Cortecs eval overlay — appends .env.model and injects CORTECSAI_API_KEY as OPENAI_API_KEY.
# Endpoint: https://api.cortecs.ai/v1
# Requires CORTECSAI_API_KEY in the shell environment (sourced from ~/.env.secrets by eval-model.sh).
#
# Usage: ./eval-model.sh qwen35-397b   — do NOT use this file directly

services:
  submodel-templates-sync:
    env_file:
      - .env.model
    environment:
      OPENAI_API_KEY: ${CORTECSAI_API_KEY}

  embedding-service:
    env_file:
      - .env.model
    environment:
      OPENAI_API_KEY: ${CORTECSAI_API_KEY}

  aas-hybrid-mcp:
    env_file:
      - .env.model
    environment:
      OPENAI_API_KEY: ${CORTECSAI_API_KEY}

  aas-agent:
    env_file:
      - .env.model
    environment:
      OPENAI_API_KEY: ${CORTECSAI_API_KEY}
