# SRN Autonomous Creation test family.
#
# Tests that the agent calls create_service_request_notification (not
# put_submodel_element) when creating a Service Request Notification, and
# correctly infers all field values from the conversation context without
# asking the user.
#
# See task_srn_slotfilling_tool_and_eval.md for context.

cases:
  - name: srn_from_fault_context
    query: >
      The transport robot in Hall 4 had an emergency stop, the red LED is on.
      What should I do and please create a service request.
    asset: MiR100_001
    expected:
      keywords: ["Open"]
      tool_called: create_service_request_notification
      tool_args:
        priority: "High"
        service_type: "CorrectiveMaintenance"
    forbidden_tools: [put_submodel_element]
    llm_criteria: >
      The agent must identify the robot in Hall 4 as MiR100_001 and call
      create_service_request_notification with priority High
      (emergency stop is safety-relevant), service_type CorrectiveMaintenance,
      and must NOT ask the user for any field values. The response must confirm
      the SRN was created successfully.
    ground_truth:
      required_facts:
        - "A service request was created for MiR100_001 (the transport robot in Hall 4)"
        - "Priority is High"
        - "ServiceType is CorrectiveMaintenance"
        - "Status is Open"
      must_not_claim:
        - "The user must provide additional information before the request can be created"
      notes: >
        Emergency stop is safety-relevant → High priority. The agent must
        resolve the spatial reference (transport robot in Hall 4) to MiR100_001
        autonomously. Confirming creation or reporting an error are both
        acceptable outcomes; silently skipping the write is not.
    tags: [srn, autonomous, paper_anecdote]

  - name: srn_routine_priority
    query: >
      Please create a service request for the UR3e robot arm in Hall 4 —
      routine inspection is due.
    asset: UR3e_002
    expected:
      keywords: ["Open"]
      tool_called: create_service_request_notification
      tool_args:
        service_type: "Inspection"
        priority: "Low"
    forbidden_tools: [put_submodel_element]
    llm_criteria: >
      The agent must identify UR3e_002 (the UR3e in Hall 4) and infer
      priority Low for a routine inspection and service_type Inspection.
      Status must be Open. Must NOT ask the user for any values —
      all fields are derivable from the context.
    ground_truth:
      required_facts:
        - "A service request was created for UR3e_002"
        - "ServiceType is Inspection"
        - "Priority is Low"
        - "Status is Open"
      must_not_claim:
        - "The user must provide additional information before the request can be created"
      notes: >
        Routine inspection → Low priority. UR3e in Hall 4 = UR3e_002.
        All field values must be inferred from context without asking the user.
    tags: [srn, autonomous, priority_inference]

  - name: srn_no_element_bypass
    query: >
      The robot with serial number urn:asset:crx10ia:001 has a motor fault —
      please create a service request.
    asset: CRX10iA_001
    expected:
      keywords: ["Open"]
      tool_called: create_service_request_notification
    forbidden_tools: [put_submodel_element, put_submodel]
    llm_criteria: >
      The agent must use create_service_request_notification to create the SRN,
      not put_submodel_element or put_submodel. Priority should reflect a motor
      fault (Medium or High). Status must be Open.
    ground_truth:
      required_facts:
        - "A service request was created for CRX10iA_001"
        - "Status is Open"
      must_not_claim:
        - "The user must provide additional information before the request can be created"
      notes: >
        Motor fault → Medium or High priority, both acceptable. The tool-path
        check (create_service_request_notification vs put_submodel_element) is
        captured in the process signal; the judge checks answer correctness only.
    tags: [srn, bypass_regression]
