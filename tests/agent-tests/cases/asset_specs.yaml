# Smoke-test cases for the framework itself — simple spec-lookup queries
# whose correct answers are well-known from the type-AAS technical-data
# submodels. Used to validate runner + evaluator before relying on harder
# containment cases.

cases:
  - name: mir100_max_speed
    query: "What is the maximum speed of the mir 100?"
    asset: MiR100
    expected:
      keywords: ["1.5"]
      pattern: "1[.,]5\\s*m/s"
    llm_criteria: >
      The answer must state the MiR100 maximum speed (1.5 m/s) with the
      correct unit. A km/h conversion (5.4 km/h) is also acceptable as a
      supplement but the m/s figure must appear.
    ground_truth:
      required_facts:
        - "MiR100 maximum speed is 1.5 m/s"
      must_not_claim: []
      notes: >
        The AAS also stores a loaded speed of 1.0 m/s — mentioning it
        alongside 1.5 m/s is fine and does not invalidate the answer.
        A km/h conversion (5.4 km/h) is acceptable as supplement.
    tags: [spec_lookup, smoke]

  - name: ur3e_payload
    query: "What is the maximum payload of the UR3e?"
    asset: UR3e
    expected:
      keywords: ["3"]
      pattern: "3\\s*kg"
    llm_criteria: >
      The answer must state the UR3e payload as 3 kg. Other UR models
      (UR20, UR10e) must not be confused with the UR3e.
    ground_truth:
      required_facts:
        - "UR3e maximum payload is 3 kg"
      must_not_claim: []
      notes: >
        Additional specs (reach, repeatability, weight, axes) are fine to
        include. Other UR models (UR20, UR10e) must not be presented as the
        answer for the UR3e.
    tags: [spec_lookup, smoke]
