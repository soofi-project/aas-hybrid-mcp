# SRN Ablation Variant A — "Prompts as Hints" baseline.
#
# Same queries as srn_autonomous.yaml but without tool_called constraints:
# create_service_request_notification is NOT available in Variant A
# (WRITE_TOOLS_MODE=generic). The agent must use put_submodel.
#
# Key differences from srn_autonomous.yaml:
# - No tool_called constraint (typed tool absent)
# - forbidden_tools: [put_submodel_element] stays — detects element-bypass
# - llm_criteria checks structural validity of the write, not tool choice
#
# Variant B (typed-only) reuses srn_autonomous.yaml unchanged.
# See task_write_tools_ablation_study.md for the full ablation design.

cases:
  - name: srn_variant_a_fault_context
    query: >
      The transport robot in Hall 4 had an emergency stop, the red LED is on.
      What should I do and please create a service request.
    asset: MiR100_001
    expected:
      keywords: ["Open"]
    forbidden_tools: [put_submodel_element]
    llm_criteria: >
      The agent must identify the robot in Hall 4 as MiR100_001 and attempt
      to create a Service Request Notification. It should use put_submodel
      (not put_submodel_element) and include Status=Open, priority High, and
      service_type CorrectiveMaintenance in the payload. The response must
      confirm the SRN was created or report a validation error — it must NOT
      silently skip the write.
    ground_truth:
      required_facts:
        - "The agent identified MiR100_001 as the transport robot in Hall 4"
        - "A write was attempted or a validation error was reported (not silently skipped)"
      must_not_claim:
        - "The user must provide additional information before anything can be done"
      notes: >
        Variant A uses generic put_submodel (no typed SRN tool). Correct
        outcomes: write confirmed with Status=Open, OR validation error
        surfaced. Either is a pass. Silently skipping the write is a fail.
        Tool-path check (put_submodel vs put_submodel_element) is in process signal.
    tags: [srn, ablation_variant_a, paper_anecdote]

  - name: srn_variant_a_routine_priority
    query: >
      Please create a service request for the UR3e robot arm in Hall 4 —
      routine inspection is due.
    asset: UR3e_002
    expected:
      keywords: ["Open"]
    forbidden_tools: [put_submodel_element]
    llm_criteria: >
      The agent must identify UR3e_002 (the UR3e in Hall 4) and attempt to
      create a Service Request Notification using put_submodel. The payload
      should include Status=Open, Priority=Low (routine inspection), and
      service_type=Inspection. The response confirms the write or surfaces an
      error — no silent failure, no asking the user for field values.
    ground_truth:
      required_facts:
        - "The agent identified UR3e_002 as the UR3e in Hall 4"
        - "A write was attempted or a validation error was reported (not silently skipped)"
      must_not_claim:
        - "The user must provide additional information before anything can be done"
      notes: >
        Variant A uses generic put_submodel. Write confirmed OR validation
        error surfaced are both correct outcomes. Silent skip is a fail.
    tags: [srn, ablation_variant_a, priority_inference]

  - name: srn_variant_a_no_element_bypass
    query: >
      The robot with serial number urn:asset:crx10ia:001 has a motor fault —
      please create a service request.
    asset: CRX10iA_001
    expected:
      keywords: ["Open"]
    forbidden_tools: [put_submodel_element]
    llm_criteria: >
      The agent must use put_submodel (atomic write) to create a Service
      Request Notification for the CRX10iA_001 motor fault. It must NOT
      construct the submodel piece-by-piece via put_submodel_element calls.
      Priority should reflect a motor fault (Medium or High). Status=Open.
    ground_truth:
      required_facts:
        - "The agent identified CRX10iA_001 as the target asset"
        - "A write was attempted or a validation error was reported"
      must_not_claim:
        - "The user must provide additional information before anything can be done"
      notes: >
        Motor fault → Medium or High priority, both acceptable. Correct
        outcome: write confirmed OR validation error surfaced. Silent skip is
        a fail. Tool-path check (put_submodel vs put_submodel_element) is in
        process signal, not judge signal.
    tags: [srn, ablation_variant_a, bypass_regression]
