# Bench B — 6 industrial queries for the Pattern × Modellgröße paper eval.
#
# Ground truth: memory/bench_b_evaluation.md + per-case `ground_truth:` blocks below.
# Used by:
#   python run_tests.py --cases cases/bench_b.yaml \
#       --variants aas-agent:react aas-agent:plan aas-agent:reflexion \
#       --repetitions 3 --export results/<slug>_bench_b_N3.json
#   python judge.py --input results/<slug>_bench_b_N3.json \
#       --cases cases/bench_b.yaml \
#       --base-url https://api.openai.com --model gpt-4o-mini-2024-07-18
#
# Query types:
#   B1-B2: graph-traversal (Cypher-affin) — containment + fleet lookup
#   B3:    attribute filter (TechnicalData payload query)
#   B4-B5: document retrieval (manual/PDF content)
#   B6:    cross-asset comparison (max payload across fleet)

cases:
  - name: bench_b_B1_hall3_contents
    query: "Which devices are located in Hall 3?"
    expected:
      keywords: ["MiR250_001", "MiR250_002", "UR3e_001", "UR20_001"]
      forbidden: ["urn:asset:hall3"]
    llm_criteria: >
      The answer must identify all four devices physically located in Hall 3:
      MiR250_001, MiR250_002, UR3e_001, and UR20_001.
      It must NOT include the hall itself (urn:asset:hall3) as a result.
    ground_truth:
      required_facts:
        - "MiR250_001 is located in Hall 3"
        - "MiR250_002 is located in Hall 3"
        - "UR3e_001 is located in Hall 3"
        - "UR20_001 is located in Hall 3"
      must_not_claim:
        - "The agent's enumerated answer list contains a 5th item that is the hall itself (Hall3 / urn:asset:hall3) treated as one of the located devices"
        - "CRX10iA_001 is one of the devices located in Hall 3"
        - "MiR100_001 is located in Hall 3"
        - "UR3e_002 is located in Hall 3"
      notes: >
        The expected core list contains EXACTLY these 4 devices and nothing
        else. It is FINE and correct for the answer to mention 'Hall 3' as
        the parent container in headings, prose, or summary text (e.g.
        'Hall 3 contains 4 devices: ...') — that is not a violation. The
        violation is only when the agent presents Hall3 itself as one of
        the answer items (e.g. a 5th row in the list/table).
    tags: [bench_b, paper_eval, graph_traversal]

  - name: bench_b_B2_autonomous_transport_fleet
    query: "Which autonomous transport robots do we have and where are they located?"
    expected:
      keywords: ["MiR100_001", "MiR250_001", "MiR250_002"]
    llm_criteria: >
      The answer must identify all three autonomous mobile robots (AMRs):
      MiR100_001 (Hall 4), MiR250_001 (Hall 3), MiR250_002 (Hall 3).
      Location must be correct for each robot.
      Stationary manipulators (UR20, UR3e, CRX10iA) must not be listed as transport robots.
    ground_truth:
      required_facts:
        - "MiR100_001 is an autonomous transport robot located in Hall 4"
        - "MiR250_001 is an autonomous transport robot located in Hall 3"
        - "MiR250_002 is an autonomous transport robot located in Hall 3"
      must_not_claim:
        - "The agent's enumerated list of autonomous transport robots includes UR20, UR3e or CRX10iA as one of the AMR/AGV items"
        - "A MiR is located in a hall other than the one stated above"
      notes: >
        The core list of transport robots must be exactly these 3 AMRs with
        correct hall mapping. Listing additional non-AMR devices (UR20,
        UR3e, CRX10iA) in extra prose as 'also in the hall' for hall
        context is acceptable and NOT a violation — only adding them to
        the agent's transport-robot enumeration is wrong.
    tags: [bench_b, paper_eval, graph_traversal]

  - name: bench_b_B3_heavy_transport_robot
    query: "Which transport robot can carry more than 200 kg?"
    expected:
      keywords: ["MiR250"]
    llm_criteria: >
      The answer must identify MiR250 (MiR250_001 and/or MiR250_002) as the robots
      capable of carrying more than 200 kg (rated at 250 kg).
      MiR100 (rated 100 kg) must NOT be listed as meeting the >200 kg criterion.
      The answer should reference the payload/load capacity attribute.
    ground_truth:
      required_facts:
        - "MiR250 (MiR250_001 and/or MiR250_002) is the robot that can carry more than 200 kg"
        - "MiR250 payload capacity is 250 kg"
      must_not_claim:
        - "MiR100 can carry more than 200 kg"
        - "MiR100 satisfies the >200 kg criterion"
      notes: >
        Mentioning MiR100 only to exclude it (e.g., 'MiR100 carries 100 kg, so not eligible')
        is OK and even desirable. Claiming MiR100 meets the criterion is wrong.
    tags: [bench_b, paper_eval, attribute_filter]

  - name: bench_b_B4_mir250_emergency_stop
    query: "What does the operator manual of the mir 250 say about emergency stops?"
    expected:
      keywords: ["emergency stop", "MiR250"]
    llm_criteria: >
      The answer must contain substantive content from the MiR250 manual about
      emergency stops — at minimum one of:
      (a) the stop category (category 0 / STO contactors / SS1 brake),
      (b) the release sequence (release E-stop button, Resume button flashes blue,
          press Resume),
      (c) the relevant manual page range (p.83-85) or equivalent content.
      A generic answer without manual content counts as failure.
    ground_truth:
      required_facts:
        - "The answer cites substantive content from the MiR250 operator manual about emergency stops"
        - "At least ONE of these specifics is mentioned: (a) stop category 0 / STO contactors / SS1 brake, OR (b) release sequence (release E-stop button, Resume button flashes blue, press Resume), OR (c) manual page range around p.83-85"
      must_not_claim:
        - "The answer relies on general standards (EN 13850, ISO) without any MiR250-specific manual content"
        - "Content is sourced from MiR100 manual (different device) when the question targets MiR250"
      notes: >
        Generic safety prose without manual-specific facts is a failure even if
        the wording sounds plausible. The judge must verify that at least one
        of the listed specifics (a/b/c) appears.
    tags: [bench_b, paper_eval, document_retrieval]

  - name: bench_b_B5_hall4_red_status_light
    query: >
      The transport robot in Hall 4 has a red status light —
      what does it mean and how do I fix it?
    expected:
      keywords: ["MiR100_001"]
      forbidden: ["MiR250"]
    llm_criteria: >
      The answer must first correctly identify the robot in Hall 4 as MiR100_001
      (NOT MiR250 — MiR250 units are in Hall 3).
      It must then provide troubleshooting content from the MiR100 manual about
      the LED bar / status light, covering at least one of:
      emergency stop procedure, protective stop, diagnostic steps, or camera check.
      Identifying the wrong robot (MiR250) is an automatic failure regardless of
      the troubleshooting content quality.
    ground_truth:
      required_facts:
        - "The robot in Hall 4 is identified as MiR100_001 (or simply MiR100)"
        - "Troubleshooting content from the MiR100 manual is provided, covering at least one of: emergency stop procedure, protective stop, diagnostic steps, or camera check"
      must_not_claim:
        - "The robot in Hall 4 is a MiR250 (or that the answer is for MiR250)"
      notes: >
        Mentioning MiR250 only for context ('MiR250 units live in Hall 3, so
        the Hall 4 robot must be MiR100_001') is acceptable and does NOT count
        as wrong identification. The failure mode is the agent answering for
        MiR250 as if it were the Hall 4 robot.
    tags: [bench_b, paper_eval, document_retrieval]

  - name: bench_b_B6_heaviest_payload_comparison
    query: "Which of our robots can carry the heaviest load?"
    expected:
      keywords: ["MiR250", "250"]
    llm_criteria: >
      The answer must identify MiR250 as the robot with the highest payload capacity
      (250 kg), and should compare it against the other robots in the fleet.
      The agent must retrieve payload data from at least two different robots
      (cross-asset comparison) — an answer that names MiR250 without consulting
      other robots' specs is only partially correct.
      The payload value (250 kg) must be mentioned.
    ground_truth:
      required_facts:
        - "MiR250 is identified as the robot with the highest payload capacity"
        - "The payload value 250 kg is mentioned for MiR250"
        - "Payload data from at least one OTHER robot is reported in the answer (in any form: comparison table, side-by-side numbers, or prose like 'MiR100 carries 100 kg'). A table listing several robots with their payloads counts."
      must_not_claim:
        - "A robot other than MiR250 has the highest payload"
        - "MiR250 payload is anything other than 250 kg"
      notes: >
        A summary table that lists multiple robots (MiR100, UR20, UR3e,
        CRX10iA) with their payload numbers satisfies the comparison
        requirement — that IS the cross-asset comparison. Naming only
        MiR250 without ANY other robot's payload is partial and counts as
        wrong.
    tags: [bench_b, paper_eval, cross_asset_comparison]
