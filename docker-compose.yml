name: aas-hybrid-mcp

networks:
  aas-network:
    driver: bridge

services:

  ########### Kafka ###################################################################

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    hostname: kafka
    container_name: kafka
    ports:
      - "9093:9093"
    environment:
      KAFKA_ADVERTISED_LISTENERS: INTER_BROKER://kafka:9094,PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTER_BROKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: INTER_BROKER://:9094,CONTROLLER://:9095,PLAINTEXT://:9092,EXTERNAL://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTER_BROKER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_BROKER_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9095
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: jmpccZs2RHaYUbZ-LgaIhQ
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/kafka/9092"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - aas-network

  ########### MongoDB ###################################################################

  mongo:
    image: mongo:${MONGODB_VERSION}
    hostname: mongo
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoAdmin
      MONGO_INITDB_ROOT_PASSWORD: mongoPassword
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://mongoAdmin:mongoPassword@localhost:27017/admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - aas-network

  ########### BaSyx Components ###################################################################

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:${BASYX_V3_VERSION}
    container_name: aas-registry
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - aas-network

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:${BASYX_V3_VERSION}
    container_name: submodel-registry
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - aas-network

  aas-discovery:
    image: eclipsebasyx/aas-discovery:${BASYX_V3_VERSION}
    container_name: aas-discovery
    restart: unless-stopped
    ports:
      - "9100:8081"
    environment:
      BASYX_BACKEND: MongoDB
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: aas-env
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - aas-network

  aas-environment:
    image: eclipsebasyx/aas-environment:${BASYX_V3_VERSION}
    container_name: aas-environment
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      BASYX_BACKEND: MongoDB
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: aas-env
      BASYX_FEATURE_KAFKA_ENABLED: true
      BASYX_AASREPOSITORY_FEATURE_DISCOVERYINTEGRATION: http://aas-discovery:8081
      SPRING_KAFKA_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      BASYX_AASREPOSITORY_FEATURE_REGISTRYINTEGRATION: http://aas-registry:8080
      BASYX_SUBMODELREPOSITORY_FEATURE_REGISTRYINTEGRATION: http://submodel-registry:8080
      BASYX_AASREPOSITORY_FEATURE_AASXUPLOAD_ENABLED: "true"
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,PUT,OPTIONS,HEAD
      BASYX_ENVIRONMENT: file:/application/files/aasx/
      BASYX_EXTERNALURL: http://localhost:8081,http://aas-environment:8081,http://host.docker.internal:8081
      SPRING_KAFKA_PRODUCER_PROPERTIES_MAX_REQUEST_SIZE: 10485760
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 500MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 500MB
    volumes:
#      - ./aasx/:/application/files/aasx/
      - ./aasx/Hall3.aasx:/application/files/aasx/Hall3.aasx
      - ./aasx/Hall4.aasx:/application/files/aasx/Hall4.aasx
      - ./aasx/MiR100_Type.aasx:/application/files/aasx/MiR100_Type.aasx
      - ./aasx/MiR100_001.aasx:/application/files/aasx/MiR100_001.aasx
      - ./aasx/MiR250_Type.aasx:/application/files/aasx/MiR250_Type.aasx
      - ./aasx/MiR250_001.aasx:/application/files/aasx/MiR250_001.aasx
      - ./aasx/MiR250_002.aasx:/application/files/aasx/MiR250_002.aasx
      - ./aasx/UR3e_Type.aasx:/application/files/aasx/UR3e_Type.aasx
      - ./aasx/UR3e_001.aasx:/application/files/aasx/UR3e_001.aasx
      - ./aasx/UR3e_002.aasx:/application/files/aasx/UR3e_002.aasx
      - ./aasx/UR20_Type.aasx:/application/files/aasx/UR20_Type.aasx
      - ./aasx/UR20_001.aasx:/application/files/aasx/UR20_001.aasx
      - ./aasx/CRX10iA_Type.aasx:/application/files/aasx/CRX10iA_Type.aasx
      - ./aasx/CRX10iA_001.aasx:/application/files/aasx/CRX10iA_001.aasx
      - ./aasx/aas-hybrid-mcp-concept-descriptions.aasx:/application/files/aasx/aas-hybrid-mcp-concept-descriptions.aasx
      - ./aasx/vocabulary.aasx:/application/files/aasx/vocabulary.aasx

    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      aas-registry:
        condition: service_healthy
      submodel-registry:
        condition: service_healthy
      aas-discovery:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "http://localhost:8081/actuator/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 3600s
    networks:
      - aas-network

  ########### BaSyx Viewer Proxy (Content-Disposition rewrite sidecar) ##################

  basyx-viewer-proxy:
    image: nginx:alpine
    container_name: basyx-viewer-proxy
    restart: unless-stopped
    ports:
      # 8082 is taken by submodel-registry; 8091 sits next to open-webui (8090).
      - "8091:80"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      aas-environment:
        condition: service_healthy
    networks:
      - aas-network

  ########### Kafka Connect — RAG (HTTP Sink) ############################################

  kafka-connect-rag:
    image: aas-hybrid-mcp-kafka-connect-rag:${KAFKA_VERSION}-${RAG_CONNECT_VERSION}
    container_name: kafka-connect-rag
    restart: unless-stopped
    build:
      context: kafka-connect-rag
    pull_policy: never
    ports:
      - "8085:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect-rag"
      CONNECT_LOG4J_LOGGERS: "org.apache.kafka.connect=INFO"
      BASYX_AAS_REPO_URL: http://aas-environment:8081
      BASYX_SM_REPO_URL: http://aas-environment:8081
    depends_on:
      kafka:
        condition: service_healthy
      aas-environment:
        condition: service_healthy
    volumes:
      - ./kafka-connect-rag/config/http-sink-connector.json:/etc/kafka-connect/config/http-sink-connector.json
      - ./kafka-connect-rag/scripts/entrypoint.sh:/etc/basyx/entrypoint.sh
      - ./logs:/tmp/kafka-logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - aas-network

  ########### Kafka Connect — Neo4j (pre-built image) ####################################

  kafka-connect-neo4j:
    image: dfkibasys/aas-neo4j-kafka-connect-plugin:${NEO4J_KAFKA_CONNECT_VERSION}
    container_name: kafka-connect-neo4j
    restart: unless-stopped
    ports:
      - "8084:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect-neo4j"
      CONNECT_LOG4J_LOGGERS: "de.dfki.cos=INFO,org.apache.kafka.connect=ERROR,org.apache.kafka.connect.runtime=WARN,io.pebbletemplates.pebble=ERROR"
      BASYX_AAS_REPO_URL: http://aas-environment:8081
      BASYX_NEO4J_TARGET_URL: http://neo4j:7474/db/neo4j/tx/commit
      CONNECT_CONSUMER_POLL_INTERVAL_MS: "100"
      CONNECT_CONSUMER_FETCH_MAX_WAIT_MS: "50"
      CONNECT_CONSUMER_FETCH_MIN_BYTES: "1"
      CONNECT_CONSUMER_MAX_POLL_RECORDS: "500"
      CONNECT_CONSUMER_OVERRIDE_SESSION_TIMEOUT:MS: "30000"
      CONNECT_CONSUMER_OVERRIDE_MAX_POLL_INTERVAL_MS: "600000"
      CONNECT_CONSUMER_OVERRIDE_HEARTBEAT_INTERVAL_MS: "3000"
    depends_on:
      kafka:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - aas-network

  ########### Management UIs ###########################################################

  akhq:
    image: tchiotludo/akhq:${AKHQ_VERSION}
    container_name: akhq
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka-server:
              properties:
                bootstrap.servers: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aas-network

  aas-gui:
    image: eclipsebasyx/aas-gui:${AAS_WEBUI_VERSION}
    container_name: aas-gui
    restart: unless-stopped
    ports:
      - "8099:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      AAS_DISCOVERY_PATH: http://localhost:9100
      AAS_REGISTRY_PATH: http://localhost:8083
      SUBMODEL_REGISTRY_PATH: http://localhost:8082
      AAS_REPO_PATH: http://localhost:8081/shells
      SUBMODEL_REPO_PATH: http://localhost:8081/submodels
      CD_REPO_PATH: http://localhost:8081/concept-descriptions
    depends_on:
      aas-registry:
        condition: service_healthy
      submodel-registry:
        condition: service_healthy
      aas-environment:
        condition: service_healthy
    networks:
      - aas-network

  ########### Neo4j ####################################################################

  neo4j:
    image: dfki-neo4j:5.26.8-community-bullseye-apoc
    build:
      context: neo4j
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: none
      NEO4J_dbms_memory_heap_max__size: 8G
      NEO4J_dbms_memory_pagecache_size: 4G
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 30s
      start_period: 8s
      timeout: 10s
      retries: 5
    networks:
      - aas-network

  ########### Weaviate #################################################################

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: weaviate
    restart: unless-stopped
    ports:
      - "8070:8080"
      - "50051:50051"
    volumes:
      - weaviate_content:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aas-network

  ########### Submodel Templates Sync (init container) ##################################

  submodel-templates-sync:
    build:
      context: ./submodel-templates-sync
    container_name: submodel-templates-sync
    restart: "no"
    env_file:
      - .env
      - ${SECRETS_PATH}
    environment:
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      WEAVIATE_GRPC_PORT: 50051
      TEMPLATES_OUTPUT_DIR: /data/templates
      CD_REPO_URL: http://aas-environment:8081
      # Optional: set TEMPLATES_LOCAL_PATH to skip the GitHub clone on air-gapped hosts.
      # Requires a bind-mount of a local git clone of admin-shell-io/submodel-templates
      # (see commented volume line below). Leave empty to clone from GitHub as usual.
      TEMPLATES_LOCAL_PATH: "${TEMPLATES_LOCAL_PATH:-}"
    volumes:
      - template_data:/data/templates
      - ./data/user-templates:/data/user-templates:ro
      # Uncomment and set TEMPLATES_LOCAL_PATH=/data/submodel-templates-idta when
      # the H200 has no internet access (air-gapped deployment):
      # - /data/submodel-templates-idta:/data/submodel-templates-idta:ro
    depends_on:
      weaviate:
        condition: service_healthy
      aas-environment:
        condition: service_healthy
    networks:
      - aas-network

  ########### Embedding Service ########################################################

  embedding-service:
    build:
      context: ./embedding-service
    container_name: embedding-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
      - ${SECRETS_PATH}
    environment:
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - WEAVIATE_COLLECTION=aas_documents
      - BASYX_SUBMODEL_REPO=http://aas-environment:8081
    depends_on:
      - weaviate
    deploy:
      resources:
        limits:
          memory: 4096M
        reservations:
          memory: 2048M
    networks:
      - aas-network
    volumes:
      - embedding-docling-cache:/home/appuser/.cache/docling

  ########### AAS Hybrid MCP Server ####################################################

  aas-hybrid-mcp:
    build:
      context: ./mcp-server
    container_name: aas-hybrid-mcp
    restart: unless-stopped
    ports:
      - "8110:8110"
    env_file:
      - .env
      - ${SECRETS_PATH}
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_DATABASE: neo4j
      WEAVIATE_HOST: weaviate
      TEMPLATES_DIR: /data/templates
      AAS_REPO_URL: http://aas-environment:8081
      SUBMODEL_REPO_URL: http://aas-environment:8081
      CD_REPO_URL: http://aas-environment:8081
      # Cypher anti-pattern validator: off | warn | strict
      STRICT_READ_VALIDATION: "strict"
      # Submodel write gate: true = reject put_submodel without registered template validator
      REQUIRE_TEMPLATE_VALIDATOR: "false"
    volumes:
      - template_data:/data/templates:ro
      # Bind-mount tool descriptions and manual pages over the packaged copies so
      # edits take effect on container restart without rebuilding the image.
      - ./mcp-server/src/aas_hybrid_mcp/tool_descriptions:/usr/local/lib/python3.11/site-packages/aas_hybrid_mcp/tool_descriptions:ro
      - ./mcp-server/src/aas_hybrid_mcp/manual_pages:/usr/local/lib/python3.11/site-packages/aas_hybrid_mcp/manual_pages:ro
    depends_on:
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      aas-environment:
        condition: service_healthy
      submodel-templates-sync:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8110"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - aas-network

  ########### AAS Agent (LangGraph + OpenAI-compatible API) ################################

  aas-agent:
    build:
      context: ./aas-agent
    container_name: aas-agent
    user: "0"
    restart: unless-stopped
    ports:
      - "8120:8120"
    env_file:
      - .env
      - ${SECRETS_PATH}
    environment:
      MCP_SERVER_URL: http://aas-hybrid-mcp:8110/mcp/
      AGENT_LOG_DIR: /logs
      AGENT_VARIANT: ${AGENT_VARIANT:-react}
      OTEL_SERVICE_NAME: aas-agent
      OTEL_EXPORTER_OTLP_ENDPOINT: http://langfuse:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    volumes:
      # Bind-mount individual files over the installed copies so edits take
      # effect on restart without rebuilding the image. (Full directory mount
      # unreliable on Windows — see C:/134 path issue.)
      - ./aas-agent/src/aas_agent/api.py:/usr/local/lib/python3.11/site-packages/aas_agent/api.py:ro
      - ./aas-agent/src/aas_agent/usage.py:/usr/local/lib/python3.11/site-packages/aas_agent/usage.py:ro
      - ./aas-agent/src/aas_agent/agent.py:/usr/local/lib/python3.11/site-packages/aas_agent/agent.py:ro
      - ./aas-agent/src/aas_agent/agent_plan.py:/usr/local/lib/python3.11/site-packages/aas_agent/agent_plan.py:ro
      - ./aas-agent/src/aas_agent/agent_plan_nodes.py:/usr/local/lib/python3.11/site-packages/aas_agent/agent_plan_nodes.py:ro
      - ./aas-agent/src/aas_agent/agent_plan_graph.py:/usr/local/lib/python3.11/site-packages/aas_agent/agent_plan_graph.py:ro
      - ./aas-agent/src/aas_agent/agent_plan_state.py:/usr/local/lib/python3.11/site-packages/aas_agent/agent_plan_state.py:ro
      - ./aas-agent/src/aas_agent/reflexion.py:/usr/local/lib/python3.11/site-packages/aas_agent/reflexion.py:ro
      - ./aas-agent/src/aas_agent/reflexion_graph.py:/usr/local/lib/python3.11/site-packages/aas_agent/reflexion_graph.py:ro
      - ./aas-agent/src/aas_agent/reflexion_graph_nodes.py:/usr/local/lib/python3.11/site-packages/aas_agent/reflexion_graph_nodes.py:ro
      - ./aas-agent/src/aas_agent/reflexion_state.py:/usr/local/lib/python3.11/site-packages/aas_agent/reflexion_state.py:ro
      - ./aas-agent/src/aas_agent/verbose_stream_utils.py:/usr/local/lib/python3.11/site-packages/aas_agent/verbose_stream_utils.py:ro
      - ./aas-agent/src/aas_agent/mcp_client.py:/usr/local/lib/python3.11/site-packages/aas_agent/mcp_client.py:ro
      - ./aas-agent/src/aas_agent/qwen_parser.py:/usr/local/lib/python3.11/site-packages/aas_agent/qwen_parser.py:ro
      - ./aas-agent/src/aas_agent/trace.py:/usr/local/lib/python3.11/site-packages/aas_agent/trace.py:ro
      - ./aas-agent/src/aas_agent/system-prompt.md:/usr/local/lib/python3.11/site-packages/aas_agent/system-prompt.md:ro
      - ./aas-agent/src/aas_agent/synthesizer_rules.md:/usr/local/lib/python3.11/site-packages/aas_agent/synthesizer_rules.md:ro
      - ./aas-agent/src/aas_agent/agent_plan_prompts:/usr/local/lib/python3.11/site-packages/aas_agent/agent_plan_prompts:ro
      
      - ./interaction-protocol:/logs
    depends_on:
      aas-hybrid-mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8120/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aas-network

  ########### Open WebUI ##################################################################

  open-web-ui:
    image: ghcr.io/open-webui/open-webui:v${OPEN_WEBUI_VERSION}
    container_name: open-web-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    env_file:
      - ${SECRETS_PATH}
    environment:
      WEBUI_AUTH: "true"
      WEBUI_SECRET_KEY: aas-hybrid-mcp-dev-key
      WEBUI_ADMIN_EMAIL: ${OPEN_WEBUI_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${OPEN_WEBUI_PASSWORD}
      ENABLE_SIGNUP: "false"
      OFFLINE_MODE: "true"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "false"
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "true"
      # Two endpoints: aas-agent for chat (agentic), direct vLLM (LiteLLM proxy
      # on H200) for Open WebUI background tasks (title/tag/follow-up).
      # The vLLM endpoint sidesteps LangGraph entirely — no hop through the agent.
      # open-webui-seed applies a model_ids allowlist on connection 1 via the
      # /openai/config/update API so only aas-agent:* shows up in the user
      # dropdown; TASK_MODEL_EXTERNAL still resolves ${LLM_MODEL} at the backend.
      OPENAI_API_BASE_URLS: "http://aas-agent:8120/v1;${LLM_BASE_URL}"
      OPENAI_API_KEYS: "no-key;dummy"
      DEFAULT_MODELS: "aas-agent:react"
      TASK_MODEL_EXTERNAL: "${LLM_MODEL}"
      # Direct MCP still available for tools; agent adds resource access
      TOOL_SERVER_CONNECTIONS: '[{"url":"http://aas-hybrid-mcp:8110/mcp/","type":"mcp","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"aas-hybrid-mcp","name":"AAS Hybrid MCP","description":"Neo4j graph queries, Weaviate document search, and IDTA template search for Asset Administration Shells"}}]'
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      aas-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/health | jq -e '.status == true'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - aas-network

  ########### Open WebUI Model Seed (init container) ######################################

  open-webui-seed:
    build:
      context: ./open-webui
    container_name: open-webui-seed
    restart: "no"
    environment:
      SEED_EMAIL:  ${OPEN_WEBUI_EMAIL}
      SEED_PASSWORD: ${OPEN_WEBUI_PASSWORD}
      TASK_MODEL_ID: ${LLM_MODEL}
    volumes:
      # Bind-mount so edits to the seed script / model definition take effect
      # on container restart without rebuilding the image.
      - ./open-webui/seed-model.sh:/app/seed-model.sh:ro
      - ./open-webui/model.json:/app/model.json:ro
    depends_on:
      open-web-ui:
        condition: service_healthy
    networks:
      - aas-network

  ########### MCP Inspector ############################################################

  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:${MCPINSPECTOR_VERSION}
    container_name: mcp-inspector
    restart: unless-stopped
    ports:
      - "6274:6274"
      - "6277:6277"
    environment:
      HOST: "0.0.0.0"
      MCP_PROXY_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_AUTO_OPEN_ENABLED: "false"
    depends_on:
      # Anchor for docker compose up --wait: ensures one-shot init containers
      # (open-webui-seed, submodel-templates-sync) have completed before the
      # stack is considered ready.
      open-webui-seed:
        condition: service_completed_successfully
    networks:
      - aas-network

volumes:
  weaviate_content:
  template_data:
  open_webui_data:
  embedding-docling-cache:
