# BaSyx Viewer Proxy — Content-Disposition rewrite sidecar.
#
# Why this exists:
#   BaSyx serves /attachment endpoints with hardcoded
#   `Content-Disposition: attachment; filename="..."`, which forces browsers
#   to download PDFs instead of rendering them in the built-in viewer.
#   Without inline rendering, `source_jump_url`'s #page=N fragment is ignored.
#
# What it does:
#   Strips the upstream Content-Disposition header and replaces it with
#   `inline`. Pure HTTP-header rewrite, no transformation of the body.
#
# Why nginx (and not mcp-server or a PDF.js self-host):
#   - mcp-server should stay focused on the MCP protocol.
#   - Browser PDF viewers (Chrome, Firefox) are already PDF.js — self-hosting
#     it adds a container, CORS, an extra round-trip, and gains nothing here.
#   - A 20-line nginx sidecar is the smallest sufficient change.
#
# In a Kubernetes deployment this collapses into the ingress / Traefik rules
# and this container goes away.

server {
    listen 80;

    location / {
        proxy_pass http://aas-environment:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # Streaming — PDFs are commonly 5-50 MB; buffering them in nginx
        # before forwarding wastes RAM and adds latency.
        proxy_buffering off;

        # The actual purpose of this whole container:
        proxy_hide_header Content-Disposition;
        add_header Content-Disposition 'inline; filename="document.pdf"' always;
    }
}
